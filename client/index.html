<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />

      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>TolanWorkforce - نظام إدارة القوى العاملة</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <script>
      // التقاط حدث "beforeinstallprompt" في أقرب لحظة ممكنة (قبل React وقبل تسجيل الدخول)
      // لأن المتصفح يطلق هذا الحدث مرة واحدة فقط ولا يعيد إطلاقه إذا فاتنا الاستماع له.
      window.__pwaInstallEvent = null;
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        window.__pwaInstallEvent = e;
        window.dispatchEvent(new Event("pwa-install-available"));
      });
      window.addEventListener("appinstalled", function () {
        window.__pwaInstallEvent = null;
        window.dispatchEvent(new Event("pwa-install-done"));
      });
    </script>
